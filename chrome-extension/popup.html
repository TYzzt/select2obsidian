<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Select to Note</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Select to Note</h1>
        <span id="status-pill" class="pill neutral">Not checked</span>
      </header>

      <section class="panel status-panel">
        <p id="status-detail" class="detail">Check the receiver before clipping.</p>
        <div id="plugin-help" class="help" hidden>
          <button id="obsidian-plugin" type="button" class="link-button">Open Obsidian plugin page</button>
        </div>
      </section>

      <section class="meta">
        <div>
          <span>Shortcut</span>
          <strong id="shortcut">Ctrl+Shift+X</strong>
        </div>
        <div>
          <span>Target</span>
          <strong id="target">Active note end</strong>
        </div>
      </section>

      <div class="actions">
        <button id="start" type="button" class="primary">Start selection</button>
        <button id="check" type="button">Check connection</button>
        <button id="options" type="button">Settings</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
