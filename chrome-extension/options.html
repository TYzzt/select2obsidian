<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Select to Note Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Select to Note</h1>

      <section class="panel">
        <h2>Advanced connection</h2>
        <p class="hint">Most users can keep these defaults. Change them only if the Obsidian plugin uses a different endpoint or token.</p>
        <label>
          Obsidian endpoint
          <input id="endpoint" type="url" spellcheck="false">
        </label>
        <label>
          Shared token
          <input id="token" type="password" autocomplete="off" spellcheck="false">
        </label>
      </section>

      <section class="panel">
        <h2>Clipping</h2>
        <label class="check-row">
          <input id="include-source" type="checkbox">
          <span>Include source when clipping</span>
        </label>
      </section>

      <section class="panel">
        <h2>Translation</h2>
        <p class="hint">Optional advanced feature. Baidu Translate requires your own App ID and secret.</p>
        <label class="check-row">
          <input id="translation-enabled" type="checkbox">
          <span>Enable Baidu Translate</span>
        </label>
        <div id="translation-fields">
          <label>
            Baidu App ID
            <input id="baidu-app-id" type="text" autocomplete="off" spellcheck="false">
          </label>
          <label>
            Baidu secret
            <input id="baidu-secret" type="password" autocomplete="off" spellcheck="false">
          </label>
          <label>
            Target language
            <select id="translation-target">
              <option value="auto">Auto</option>
              <option value="zh">中文 zh</option>
              <option value="en">English en</option>
            </select>
          </label>
          <button id="test-translation" type="button" class="secondary">Test translation</button>
        </div>
      </section>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <button id="generate" type="button">Generate new token</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
